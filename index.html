<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc review của @captain.ao.xanh</title>
    <style>
        /* Thiết lập nền và font chữ cơ bản */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc; /* Màu nền xám nhạt */
            color: #333;
            max-width: 480px; /* Chiều rộng tối ưu cho điện thoại */
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }

        /* Định dạng ảnh đại diện */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }

        /* Tên kênh TikTok */
        .name {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #111;
        }

        /* Dòng giới thiệu (Bio) */
        .bio {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Định dạng các nút bấm (Link Affiliate) */
        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Khoảng cách giữa các nút */
        }

        .link-btn {
            display: block;
            background-color: #ffffff; /* Nền nút màu trắng */
            color: #333;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid #e1e4e8;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            position: relative;
        }

        /* Hiệu ứng khi người dùng chạm/di chuột vào nút */
        .link-btn:hover, .link-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: #ee4d2d; /* Đổi viền sang màu cam Shopee khi chạm */
            color: #ee4d2d;
        }

        /* Nổi bật nút quan trọng (Hot/Trend) */
        .link-btn.highlight {
            background-color: #ee4d2d; /* Màu cam đặc trưng của Shopee */
            color: #ffffff;
            border: none;
        }
        
        .link-btn.highlight:hover {
            background-color: #d73a1e;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <img src="captain.png" alt="Avatar" class="profile-img">
    
    <h1 class="name">@captain.ao.xanh</h1>
    
    <p class="bio">Chào mừng bạn đến với tủ đồ của mình! ✨<br>Tất cả đồ xinh mình mặc trong video đều ở đây nhé.</p>

    <div class="link-container">
        
        <a href="DÁN_LINK_SHOPEE_CỦA_BẠN_VÀO_ĐÂY" class="link-btn highlight" target="_blank">
            🔥 Áo thun form rộng (Video ngày 11/06)
        </a>

        <a href="DÁN_LINK_SHOPEE_CỦA_BẠN_VÀO_ĐÂY" class="link-btn" target="_blank">
            👗 Chân váy xòe chữ A dáng dài
        </a>

        <a href="DÁN_LINK_SHOPEE_CỦA_BẠN_VÀO_ĐÂY" class="link-btn" target="_blank">
            👜 Túi kẹp nách phong cách Hàn Quốc
        </a>

        <a href="DÁN_LINK_SHOPEE_CỦA_BẠN_VÀO_ĐÂY" class="link-btn" target="_blank">
            👟 Giày Sneaker trắng basic
        </a>

    </div>

</body>
</html>
